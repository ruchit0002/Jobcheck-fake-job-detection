{% extends "base.html" %}

{% block content %}
<div class="page-header" data-aos="fade-down">
  <h1><i class="fas fa-sign-in-alt me-2"></i> Sign in to JobCheck AI</h1>
  <p>Access your dashboard and start analyzing job postings with AI</p>
</div>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6" data-aos="fade-up">
      <div class="card-modern">
        <div class="card-header-modern text-center">
          <i class="fas fa-user-circle fa-3x mb-2"></i>
          <h5 class="mb-0">Welcome Back</h5>
        </div>
        <div class="card-body-modern">
          <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-4">
              <label class="form-label-modern"><i class="fas fa-user me-2"></i>Username</label>
              <input type="text" class="form-control-modern" name="username" required placeholder="Your username">
            </div>
            <div class="mb-4">
              <label class="form-label-modern"><i class="fas fa-lock me-2"></i>Password</label>
              <input type="password" class="form-control-modern" name="password" required placeholder="Your password">
            </div>
            <button type="submit" class="btn btn-primary-modern w-100 py-2">
              <i class="fas fa-arrow-right-to-bracket me-2"></i> Sign In
            </button>
          </form>
          <hr class="my-4" style="background: rgba(99,102,241,0.2);">
          <div class="text-center">
            <p class="text-muted mb-3">New to JobCheck AI?</p>
            <a href="{{ url_for('register') }}" class="btn btn-primary-modern">
              <i class="fas fa-user-plus me-1"></i> Create an account
            </a>
            <a href="{{ url_for('index') }}" class="btn btn-modern ms-2" style="background: linear-gradient(135deg, rgba(99,102,241,0.25), rgba(34,211,238,0.25)); color:#e5e7eb;">
              <i class="fas fa-home me-1"></i> Back to Dashboard
            </a>
          </div>
          
          <!-- Demo Credentials -->
          <div class="mt-4 p-3 rounded-lg" style="background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.2);">
            <p class="text-center text-sm mb-0" style="font-size: 0.8rem; color: #94a3b8;">
              <i class="fas fa-info-circle me-1"></i> Demo Account: <strong>admin</strong> / <strong>admin123</strong>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
