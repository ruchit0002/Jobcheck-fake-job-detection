{% extends "base.html" %}

{% block content %}
<div class="page-header" data-aos="fade-down">
  <h1><i class="fas fa-unlock-alt me-2"></i> Reset Password</h1>
  <p>Enter the OTP you received and set a new password.</p>
</div>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6" data-aos="fade-up">
      <div class="card-modern">
        <div class="card-header-modern text-center">
          <i class="fas fa-lock fa-3x mb-2"></i>
          <h5 class="mb-0">Verify OTP</h5>
        </div>
        <div class="card-body-modern">
          <form method="POST" class="form-modern">
            <div class="mb-3">
              <label class="form-label-modern"><i class="fas fa-user me-2"></i> Username or Email</label>
              <input type="text" class="form-control-modern" name="identifier" required placeholder="Enter your username or email">
            </div>
            <div class="mb-3">
              <label class="form-label-modern"><i class="fas fa-hashtag me-2"></i> OTP</label>
              <input type="text" class="form-control-modern" name="otp" required minlength="6" maxlength="6" placeholder="6-digit code">
            </div>
            <div class="mb-3">
              <label class="form-label-modern"><i class="fas fa-key me-2"></i> New Password</label>
              <input type="password" class="form-control-modern" name="new_password" required minlength="6" placeholder="Enter new password">
            </div>
            <div class="mb-4">
              <label class="form-label-modern"><i class="fas fa-key me-2"></i> Confirm Password</label>
              <input type="password" class="form-control-modern" name="confirm_password" required minlength="6" placeholder="Re-enter new password">
            </div>
            <button type="submit" class="btn btn-success-modern btn-modern w-100">
              <i class="fas fa-check me-2"></i> Reset Password
            </button>
          </form>

          <hr class="my-4">
          <div class="text-center">
            <a href="{{ url_for('forgot_password') }}" class="text-decoration-none me-3" style="color:#a5b4fc"><i class="fas fa-key me-1"></i> Request new OTP</a>
            <a href="{{ url_for('login') }}" class="text-decoration-none" style="color:#a5b4fc"><i class="fas fa-arrow-left me-1"></i> Back to Login</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
